<!doctype html>
<html lang="en">
  <head>
    <script>
      // Workaround for environments where window.fetch has only a getter
      try {
        let originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get() {
            return originalFetch;
          },
          set(newValue) {
            originalFetch = newValue;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn("Could not define custom setter for window.fetch:", e);
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
